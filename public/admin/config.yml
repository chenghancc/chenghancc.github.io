backend:
  name: github
  repo: chenghancc/chenghancc.github.io
  branch: main
  # GitHub Pages 场景需要一个 OAuth 回调服务，见 docs/CMS_ADMIN.zh-CN.md
  base_url: https://chenghancc-cms-oauth.1663813502.workers.dev
  auth_endpoint: /auth
  site_domain: blog.124602.xyz

# 本地开发时可配合 `pnpm cms:proxy` 使用，无需走 OAuth
local_backend: true

media_folder: public/uploads
public_folder: /uploads

publish_mode: simple

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: posts
    label: 文章
    label_singular: 文章
    folder: src/content/posts
    create: true
    extension: md
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} - {{published}}"
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 发布时间, name: published, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: 更新时间, name: updated, widget: datetime, required: false, date_format: "YYYY-MM-DD", time_format: false }
      - { label: 摘要, name: description, widget: text, required: false }
      - { label: 封面图, name: image, widget: image, required: false, media_folder: "public/uploads/post-cover", public_folder: "/uploads/post-cover" }
      - label: 标签
        name: tags
        widget: list
        required: false
        default: []
        field: { label: 标签, name: tag, widget: string }
      - { label: 分类, name: category, widget: string, required: false }
      - { label: 语言, name: lang, widget: string, required: false, hint: "默认留空，跟随站点语言" }
      - { label: 草稿, name: draft, widget: boolean, default: false, required: false }
      - { label: 正文, name: body, widget: markdown }

  - name: spec
    label: 单页
    files:
      - label: 关于页
        name: about
        file: src/content/spec/about.md
        fields:
          - { label: 内容, name: body, widget: markdown }

  - name: settings
    label: 站点设置
    files:
      - label: 全局配置
        name: site_settings
        file: src/site-settings.json
        fields:
          - label: 站点信息
            name: siteConfig
            widget: object
            fields:
              - { label: 站点标题, name: title, widget: string }
              - { label: 站点副标题, name: subtitle, widget: string }
              - label: 站点语言
                name: lang
                widget: select
                options: [en, zh_CN, zh_TW, ja, ko, es, th, vi, tr, id]
              - label: 主题色
                name: themeColor
                widget: object
                fields:
                  - { label: 色相(0-360), name: hue, widget: number, value_type: int, min: 0, max: 360, step: 1 }
                  - { label: 固定主题色, name: fixed, widget: boolean, required: false }
              - label: Banner
                name: banner
                widget: object
                fields:
                  - { label: 启用Banner, name: enable, widget: boolean, required: false }
                  - { label: Banner图片, name: src, widget: image, required: false, media_folder: "public/uploads/site-banner", public_folder: "/uploads/site-banner" }
                  - label: Banner位置
                    name: position
                    widget: select
                    options: [top, center, bottom]
                  - label: 图片来源信息
                    name: credit
                    widget: object
                    fields:
                      - { label: 显示来源, name: enable, widget: boolean, required: false }
                      - { label: 来源文字, name: text, widget: string, required: false }
                      - { label: 来源链接, name: url, widget: string, required: false }
              - label: 目录(Toc)
                name: toc
                widget: object
                fields:
                  - { label: 启用目录, name: enable, widget: boolean, required: false }
                  - label: 目录层级
                    name: depth
                    widget: select
                    options: [1, 2, 3]

          - label: 导航栏
            name: navBar
            widget: object
            fields:
              - label: 预设链接
                name: enablePresets
                widget: object
                fields:
                  - { label: 首页, name: home, widget: boolean, required: false }
                  - { label: 归档, name: archive, widget: boolean, required: false }
                  - { label: 关于, name: about, widget: boolean, required: false }
              - label: 自定义链接
                name: links
                widget: list
                required: false
                fields:
                  - { label: 名称, name: name, widget: string }
                  - { label: 链接, name: url, widget: string }
                  - { label: 外链(新窗口), name: external, widget: boolean, required: false }

          - label: 个人资料
            name: profileConfig
            widget: object
            fields:
              - { label: 头像URL, name: avatar, widget: string, required: false }
              - { label: 昵称, name: name, widget: string }
              - { label: 简介, name: bio, widget: text, required: false }
              - label: 社交链接
                name: links
                widget: list
                required: false
                fields:
                  - { label: 平台名, name: name, widget: string }
                  - { label: 图标代码(Iconify), name: icon, widget: string }
                  - { label: 链接, name: url, widget: string }

          - label: 版权配置
            name: licenseConfig
            widget: object
            fields:
              - { label: 启用版权声明, name: enable, widget: boolean, required: false }
              - { label: 版权名称, name: name, widget: string }
              - { label: 版权链接, name: url, widget: string }

          - label: 代码高亮
            name: expressiveCodeConfig
            widget: object
            fields:
              - { label: 主题名, name: theme, widget: string }
